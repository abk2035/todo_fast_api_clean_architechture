[alembic]
script_location = alembic
# L'URL de SQLAlchemy est gérée dynamiquement dans alembic/env.py via app.core.config.settings
# Une valeur fallback peut être définie ici si nécessaire (non recommandée en production).
sqlalchemy.url = postgresql+psycopg://todo_user:todo_password@localhost:5432/todo_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
